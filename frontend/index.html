<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Toko Buku</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f4f8;
            color: #333;
            padding: 40px 20px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        h1 { font-size: 1.6rem; color: #2c3e50; margin-bottom: 6px; }
        p.owner { font-size: 0.9rem; color: #888; margin-bottom: 4px; }

        ul {
            list-style: none;
            margin-top: 12px;
        }

        ul li {
            padding: 10px 14px;
            background: #f8f9fa;
            border-radius: 8px;
            margin-bottom: 8px;
            border-left: 4px solid #3498db;
        }

        h3 { font-size: 1rem; color: #2c3e50; margin-bottom: 12px; }

        .input-row {
            display: flex;
            gap: 8px;
        }

        input[type="text"] {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 0.95rem;
            outline: none;
            transition: border 0.2s;
        }

        input[type="text"]:focus { border-color: #3498db; }

        button {
            padding: 10px 18px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95rem;
            transition: background 0.2s;
        }

        button:hover { background: #2980b9; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1 id="toko-name">Memuat...</h1>
            <p class="owner" id="toko-owner"></p>
            <p class="owner" id="toko-nim"></p>
            <ul id="buku-list"></ul>
        </div>

        <div class="card">
            <h3>Tambah Buku Baru:</h3>
            <div class="input-row">
                <input type="text" id="buku-input" placeholder="Judul buku...">
                <button onclick="tambahBuku()">Tambah</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = '/api';

        function loadData() {
            fetch(`${API_URL}/info`)
                .then(res => res.json())
                .then(data => {
                    document.getElementById('toko-name').innerText = data.nama_toko;
                    document.getElementById('toko-owner').innerText = `Pemilik: ${data.pemilik}`;
                    document.getElementById('toko-nim').innerText = `NIM: ${data.nim}`;
                    const list = document.getElementById('buku-list');
                    list.innerHTML = '';
                    data.items.forEach(item => {
                        let li = document.createElement('li');
                        li.innerText = item;
                        list.appendChild(li);
                    });
                });
        }

        function tambahBuku() {
            const input = document.getElementById('buku-input');
            fetch(`${API_URL}/add-item`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ item: input.value })
            })
            .then(res => res.json())
            .then(() => {
                input.value = '';
                loadData();
            });
        }

        loadData();
    </script>
</body>
</html>
